<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ prompt[1] }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>{{ prompt[1] }}</h1>
        <nav>
            <a href="{{ url_for('index') }}">Home</a>
        </nav>
    </header>
    <main>
        <p>{{ prompt[2] }}</p>

        <div class="response-form">
            <h3>Submit Your Response</h3>
            <form action="{{ url_for('prompt', prompt_id=prompt[0]) }}" method="post" enctype="multipart/form-data">
                <textarea name="text_response" placeholder="Your text response..."></textarea>
                <input type="file" name="file_response">
                <button type="submit">Submit</button>
            </form>
        </div>

        <div class="responses">
            <h3>Responses</h3>
            {% for response in responses %}
                <div class="response-item">
                    <p><b>{{ response[2] }}</b></p>
                    <p>{{ response[0] }}</p>
                    {% if response[1] %}
                        <img src="{{ url_for('static', filename='../uploads/' + response[1]) }}" alt="User submission">
                    {% endif %}
                </div>
            {% endfor %}
        </div>
    </main>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
